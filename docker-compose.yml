version: "3.9"

services:
  app:
    build: .
    env_file:
      - .env
    container_name: my-python-app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./app:/app/app   # live reload-friendly
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload