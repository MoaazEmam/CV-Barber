{% import "_macros.html" as m %}<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 0.55in 0.7in; }
  body { font-family: "Palatino Linotype", Palatino, Georgia, serif; font-size: 10.5pt; color: #222; margin: 0; line-height: 1.4; }
  .name { text-align: center; font-size: 19pt; font-weight: normal; letter-spacing: 3px; text-transform: uppercase; }
  .contact { text-align: center; font-size: 9pt; color: #555; margin-top: 3pt; margin-bottom: 8pt; }
  .contact a { color: #555; text-decoration: none; }
  .section { margin-top: 12pt; }
  .section-heading { font-size: 11pt; font-weight: bold; font-variant: small-caps; letter-spacing: 1px;
                     border-bottom: 0.5px solid #999; padding-bottom: 2pt; margin-bottom: 5pt; }
  .entry { margin-bottom: 7pt; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; }
  .entry-title { font-weight: bold; }
  .entry-meta { white-space: nowrap; padding-left: 1em; color: #666; font-style: italic; }
  .entry-sub { font-style: italic; color: #444; }
  .entry-detail { margin-top: 1pt; }
  ul { margin: 3pt 0 0 0; padding-left: 16pt; }
  li { margin-bottom: 2pt; }
  .summary { margin: 0; text-align: justify; }
  .skill-line { margin-bottom: 2pt; }
  .skill-category { font-weight: bold; }
</style>
</head>
<body>
{{ m.body(cv) }}
</body>
</html>
