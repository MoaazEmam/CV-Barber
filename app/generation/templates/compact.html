{% import "_macros.html" as m %}<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 0.3in 0.45in; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 9pt; color: #000; margin: 0; line-height: 1.2; }
  .name { text-align: center; font-size: 16pt; font-weight: 700; }
  .contact { text-align: center; font-size: 8.5pt; margin-top: 1pt; margin-bottom: 3pt; }
  .contact a { color: #000; text-decoration: none; }
  .section { margin-top: 5pt; }
  .section-heading { font-size: 9.5pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
                     border-bottom: 1px solid #000; padding-bottom: 0.5pt; margin-bottom: 2pt; }
  .entry { margin-bottom: 3pt; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; }
  .entry-title { font-weight: 700; }
  .entry-meta { white-space: nowrap; padding-left: 0.8em; font-size: 8.5pt; }
  .entry-sub { font-style: italic; }
  .entry-detail { margin-top: 0.5pt; }
  ul { margin: 1pt 0 0 0; padding-left: 14pt; }
  li { margin-bottom: 0.5pt; }
  .summary { margin: 0; }
  .skill-line { margin-bottom: 1pt; }
  .skill-category { font-weight: 700; }
</style>
</head>
<body>
{{ m.body(cv) }}
</body>
</html>
