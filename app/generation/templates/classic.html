{% import "_macros.html" as m %}<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 0.4in 0.55in; }
  body { font-family: Georgia, "Times New Roman", Times, serif; font-size: 10.5pt; color: #000; margin: 0; line-height: 1.3; }
  .name { text-align: center; font-size: 20pt; font-weight: bold; letter-spacing: 1px; }
  .contact { text-align: center; font-size: 9.5pt; margin-top: 2pt; margin-bottom: 4pt; }
  .contact a { color: #000; text-decoration: none; }
  .section { margin-top: 9pt; }
  .section-heading { font-size: 11pt; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
                     border-bottom: 1px solid #000; padding-bottom: 1pt; margin-bottom: 4pt; }
  .entry { margin-bottom: 5pt; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; }
  .entry-title { font-weight: bold; }
  .entry-meta { white-space: nowrap; padding-left: 1em; font-style: italic; }
  .entry-sub { font-style: italic; }
  .entry-detail { margin-top: 1pt; }
  ul { margin: 2pt 0 0 0; padding-left: 16pt; }
  li { margin-bottom: 1pt; }
  .summary { margin: 0; }
  .skill-line { margin-bottom: 2pt; }
  .skill-category { font-weight: bold; }
</style>
</head>
<body>
{{ m.body(cv) }}
</body>
</html>
