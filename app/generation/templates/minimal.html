{% import "_macros.html" as m %}<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 0.6in 0.7in; }
  body { font-family: "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10pt; color: #2a2a2a; margin: 0; line-height: 1.4; }
  .name { font-size: 18pt; font-weight: 600; }
  .contact { font-size: 9pt; color: #666; margin-top: 2pt; margin-bottom: 10pt; }
  .contact a { color: #2a2a2a; text-decoration: none; }
  .section { margin-top: 12pt; }
  .section-heading { font-size: 9.5pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
                     color: #888; margin-bottom: 4pt; }
  .entry { margin-bottom: 7pt; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; }
  .entry-title { font-weight: 600; }
  .entry-meta { white-space: nowrap; padding-left: 1em; color: #888; font-size: 9pt; }
  .entry-sub { color: #666; }
  .entry-detail { margin-top: 1pt; }
  ul { margin: 3pt 0 0 0; padding-left: 15pt; list-style-type: none; }
  li { margin-bottom: 2pt; position: relative; padding-left: 10pt; }
  li::before { content: "–"; position: absolute; left: 0; color: #888; }
  .summary { margin: 0; }
  .skill-line { margin-bottom: 2pt; }
  .skill-category { font-weight: 600; }
</style>
</head>
<body>
{{ m.body(cv) }}
</body>
</html>
